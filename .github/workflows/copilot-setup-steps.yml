name: "Copilot Setup Steps"

# Run automatically when this file changes (for validation), and allow manual runs.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      # contents: write is required so the GITHUB_TOKEN can push/delete branches
      # and so the authenticated remote URL can be used for git operations.
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure git authentication and fetch main branch
        run: |
          # Set authenticated remote URL so git push/delete operations succeed
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Explicitly fetch and create a local tracking ref for main so that
          # `git diff origin/main` and similar comparisons work without error
          git fetch origin main:main
          # Verify all branches are available
          git branch -a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
