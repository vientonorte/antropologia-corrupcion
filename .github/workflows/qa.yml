name: QA Pipeline — Claude Code + Lighthouse

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: qa-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: "🔎 Detectar cambios"
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - "web/**"
              - "src/**"
              - "styles/**"
              - "data/atomic-registry.json"
              - ".lighthouserc.json"

  # ─────────────────────────────────────────────
  # Gate 1: Tests unitarios (431+ tests, 0 dependencias)
  # Incluye validación de integridad de datos JSON
  # ─────────────────────────────────────────────
  tests:
    name: "🧪 Tests unitarios"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Ejecutar suite de tests
        run: node tests/runner.js

      - name: E2E inicio público + gates sprint (P01–P03)
        run: |
          node scripts/qa-live.mjs --local
          python3 scripts/e2e-home-public.py --serve
          node scripts/qa-sprint-protocol.mjs --base=http://127.0.0.1:8000

      - name: Auditoría Atomic Design
        run: node scripts/atomic-audit.mjs --local

  # ─────────────────────────────────────────────
  # Gate 2: Lighthouse CI (performance, a11y, SEO)
  # Solo corre cuando cambian archivos web
  # ─────────────────────────────────────────────
  lighthouse:
    name: "🔦 Lighthouse CI"
    runs-on: ubuntu-latest
    needs: [tests, changes]
    if: ${{ needs.changes.outputs.web == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: lhci-${{ runner.os }}-${{ hashFiles('.lighthouserc.json') }}
          restore-keys: lhci-${{ runner.os }}-

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Lighthouse audit
        run: |
          npm install -g @lhci/cli serve wait-on
          rsync -av --exclude='terraza' web/ .
          serve . -p 3000 &
          wait-on http://localhost:3000/index.html --timeout 30000
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ─────────────────────────────────────────────
  # Resultado consolidado para branch protection
  # ─────────────────────────────────────────────
  qa-gate:
    name: "✅ QA Gate"
    runs-on: ubuntu-latest
    needs: [tests, lighthouse]
    if: always()
    steps:
      - name: Verificar que todos los gates pasaron
        run: |
          # "cancelled" ocurre cuando un push nuevo cancela un run en progreso (concurrency).
          # No es un fallo real — el run más reciente tiene el resultado definitivo.
          if [ "${{ needs.tests.result }}" = "failure" ]; then
            echo "❌ QA Gate FAILED — tests fallaron"
            exit 1
          fi
          if [ "${{ needs.tests.result }}" = "cancelled" ]; then
            echo "⚠️ QA Gate — tests cancelados (run superseded), no es un fallo real"
            exit 0
          fi
          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "❌ QA Gate FAILED — tests en estado inesperado: ${{ needs.tests.result }}"
            exit 1
          fi
          if [ "${{ needs.lighthouse.result }}" = "failure" ]; then
            echo "⚠️ Lighthouse falló — revisar performance/a11y"
            echo "✅ QA Gate PASSED (Lighthouse: warning)"
          else
            echo "✅ QA Gate PASSED — todos los checks en verde"
          fi
