name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run test suite
        run: node tests/runner.js

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Preparar artefacto de sitio estático
        run: |
          # Promover web/ a raíz: copiar todo lo que esté en web/ (excluido terraza/)
          # sin sobreescribir archivos que ya existen en raíz.
          rsync -av --ignore-existing --exclude='terraza' web/ .

          # Excluir directorios de desarrollo del artefacto público.
          rm -rf web "Estado del Arte" "Ensayo Traducción de Saberes" docs

      - name: Validar assets críticos
        run: |
          # Verificar assets post-rsync (styles/ viene de web/styles/ vía rsync)
          test -d styles || { echo "❌ styles/ no encontrado — el sitio quedaría sin CSS"; exit 1; }
          test -f styles/shared.css || { echo "❌ styles/shared.css faltante"; exit 1; }
          test -f styles/graph.css || { echo "❌ styles/graph.css faltante"; exit 1; }
          test -d src || { echo "❌ src/ no encontrado en raíz"; exit 1; }
          test -f src/frictionEngine.js || { echo "❌ src/frictionEngine.js faltante"; exit 1; }
          echo "✅ Assets críticos presentes"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
