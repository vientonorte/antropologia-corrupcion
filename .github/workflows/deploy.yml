name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run test suite
        run: node tests/runner.js

      - name: QA enlaces locales (web + data + img)
        run: node scripts/qa-links.mjs --local

      - name: Auditoría Atomic Design (local)
        run: node scripts/atomic-audit.mjs --local

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Preparar artefacto de sitio estático
        run: |
          # Promover web/ a raíz: web/ es la fuente de verdad y siempre sobreescribe raíz.
          rsync -av --exclude='terraza' web/ .

          # Gateway estático para /terraza/ (la app Next.js no se publica en Pages).
          mkdir -p terraza
          cp terraza-gateway.html terraza/index.html

          # Excluir directorios de desarrollo del artefacto público.
          rm -rf web "Estado del Arte" "Ensayo Traducción de Saberes" docs

      - name: Validar assets críticos
        run: |
          # Verificar assets post-rsync (styles/ viene de web/styles/ vía rsync)
          test -d styles || { echo "❌ styles/ no encontrado — el sitio quedaría sin CSS"; exit 1; }
          test -f styles/shared.css || { echo "❌ styles/shared.css faltante"; exit 1; }
          test -f styles/graph.css || { echo "❌ styles/graph.css faltante"; exit 1; }
          test -f shared-shell.js || { echo "❌ shared-shell.js faltante — debe vivir en web/"; exit 1; }
          test -d src || { echo "❌ src/ no encontrado en raíz"; exit 1; }
          test -f src/frictionEngine.js || { echo "❌ src/frictionEngine.js faltante"; exit 1; }
          test -f src/socialField.js || { echo "❌ src/socialField.js faltante"; exit 1; }
          test -f img/evidencia-reservada.svg || { echo "❌ img/evidencia-reservada.svg faltante"; exit 1; }
          test -f data/archivo-index.json || { echo "❌ data/archivo-index.json faltante"; exit 1; }
          test -f data/libros-clave-b.json || { echo "❌ data/libros-clave-b.json faltante"; exit 1; }
          test -f corpus-citas.html || { echo "❌ corpus-citas.html faltante"; exit 1; }
          test -f lib/corpusCitasStore.js || { echo "❌ lib/corpusCitasStore.js faltante"; exit 1; }
          test -f js/lectura-clave-a.js || { echo "❌ js/lectura-clave-a.js faltante"; exit 1; }
          test -f lib/imagePrepare.js || { echo "❌ lib/imagePrepare.js faltante"; exit 1; }
          test -f vendor/heic2any.min.js || { echo "❌ vendor/heic2any.min.js faltante"; exit 1; }
          node scripts/qa-links.mjs --deployed
          echo "✅ Assets críticos presentes"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-live:
    name: Smoke (production)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Esperar propagación Pages
        run: sleep 15

      - name: Auditoría live — paths, heurísticas y enlaces
        run: node scripts/qa-live.mjs

      - name: Atomic Design — verificación live superficies partial
        run: node scripts/atomic-audit.mjs
