<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Contra-Archivo</title>
    <meta name="theme-color" content="#0c0c0c">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0c0c0c;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        
        .wrap {
            max-width: 480px;
        }
        
        h1 {
            font-size: 4rem;
            color: #c8a96e;
            margin-bottom: .5rem;
        }
        
        p {
            color: #999;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        
        a {
            color: #c8a96e;
            text-decoration: none;
            border: 1px solid #c8a96e;
            padding: .6rem 1.5rem;
            border-radius: 4px;
            transition: background .2s, color .2s;
        }
        
        a:hover {
            background: #c8a96e;
            color: #0c0c0c;
        }

        a:focus-visible {
            outline: 2px solid #c8a96e;
            outline-offset: 3px;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: .75rem;
            justify-content: center;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.5rem;
            }

            body {
                padding: 1.25rem;
            }

            a {
                display: block;
                width: 100%;
            }
        }
    </style>
</head>
